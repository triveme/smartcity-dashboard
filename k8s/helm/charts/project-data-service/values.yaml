replicaCount: 1

image:
  repository: smartcity/project-data-service
  pullPolicy: IfNotPresent
  tag: "latest"

container:
  ports:
    - name: http
      containerPort: 8090
      protocol: TCP
  livenessProbe:
    port: 8090
  readinessProbe:
    port: 8090

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  ingressClassName: nginx
  tls: []

# Helm Required Values
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

resources: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

common:
  enabled: true
